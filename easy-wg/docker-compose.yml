services:
  wg-easy:
    environment:
      - LANG=en
      - WG_HOST=vpn.mennoniten-basel.ch
      - WG_DEFAULT_DNS=192.168.1.236
      - PASSWORD_HASH=$$2b$$12$$8GRaw7h6N9G7UfS0UQBIr.GBt5DMAvoMBgHVq9Bn1aA6A2F4cj1qG
      - PORT=51821
      - WG_PORT=51822
    image: ghcr.io/wg-easy/wg-easy
    container_name: wg-easy
    volumes:
      - ./config:/etc/wireguard
    ports:
      - "51822:51822/udp"
      - "51821:51821/tcp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - nginx_proxy_manager

networks:
  nginx_proxy_manager:
    external: true
